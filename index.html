<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Xanalife Hot Deals – Advert Card Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- html2canvas & jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --green:#0f6b3f;
  --gold:#f4b740;
  --border:#222;
}

body{
  font-family: "Segoe UI", Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#222;
}

.controls{
  max-width:1000px;
  margin:0 auto 20px;
  background:#fff;
  padding:16px;
  border-radius:8px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.controls label{
  font-weight:600;
  font-size:14px;
}

.controls input,.controls textarea{
  width:100%;
  padding:8px;
  margin:6px 0 12px;
  border:1px solid #ccc;
  border-radius:4px;
}

.controls button{
  background:var(--green);
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:4px;
  cursor:pointer;
  font-weight:600;
}

.controls button:hover{opacity:.9}

.page{
  width:210mm;
  min-height:297mm;
  margin:0 auto;
  background:#fff;
  padding:10mm;
}

.grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows:80mm;
  gap:6mm;
}

.card{
  box-shadow:0 6px 16px rgba(0,0,0,.15);
  width:100mm;
  height:80mm;
  position:relative;
  border:1px dashed var(--border);
  background: url('logo.jpeg') center center / 80% no-repeat;
  padding:6mm;
  box-sizing:border-box;
  overflow: hidden;
}

/* Overlay to ensure text readability */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background: rgba(255, 255, 255, 0.85);
  z-index:0;
}

/* Optional: Add a subtle gradient to blend logo edges */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(to bottom, 
    rgba(255,255,255,0.9) 0%,
    rgba(255,255,255,0.8) 20%,
    rgba(255,255,255,0.7) 40%,
    rgba(255,255,255,0.85) 60%,
    rgba(255,255,255,0.9) 80%,
    rgba(255,255,255,0.95) 100%);
  z-index:0;
  pointer-events: none;
}

.content{
  position:relative;
  z-index:2; /* Higher than overlays */
  height:100%;
  display:flex;
  flex-direction:column;
  background: rgba(255, 255, 255, 0.85); /* Semi-transparent white background */
  border-radius: 4px;
  padding: 4mm;
}

.header{
  text-align:center;
  line-height:1.1;
  padding-bottom:2mm;
  border-bottom:2px solid var(--gold);
  background: rgba(255, 255, 255, 0.95);
  border-radius: 4px 4px 0 0;
  margin: -4mm -4mm 0 -4mm;
  padding: 4mm 4mm 2mm 4mm;
}

.header .brand{
  font-size:20px;
  font-weight:900;
  color:var(--green);
}

.header .deal{
  font-size:15px;
  font-weight:800;
  color:#c62828;
}

.desc{
  flex:1;
  font-size:18px;
  margin:8px 0;
  text-align:center;
  font-weight:700;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4mm 0;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 4px;
  margin: 4mm 0;
}

.prices{
  text-align:center;
  margin-top: auto;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 4px;
  padding: 4mm;
  margin: 0 -4mm -4mm -4mm;
}

.old{
  font-size:16px;
  color:#555;
  text-decoration:line-through;
  margin-bottom: 3px;
}

.new{
  font-size:30px;
  font-weight:900;
  color:var(--green);
  margin-bottom: 5px;
}

.save{
  font-size:16px;
  color:#000;
  font-weight:800;
  background-color: rgba(244, 183, 64, 0.4);
  padding: 6px 12px;
  border-radius: 4px;
  display: inline-block;
  border: 1px solid var(--gold);
}

@media print{
  body{background:#fff; padding:0}
  .controls{display:none}
  .card{
    border:1px solid #000;
    background: url('logo.jpeg') center center / 80% no-repeat !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  
  .card::before,
  .card::after,
  .content,
  .header,
  .desc,
  .prices{
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}

/* Logo positioning adjustment classes */
.logo-top-left {
  background-position: 5% 5% !important;
  background-size: 30% !important;
}

.logo-top-right {
  background-position: 95% 5% !important;
  background-size: 30% !important;
}

.logo-center {
  background-position: center center !important;
  background-size: 60% !important;
}

.logo-bottom-left {
  background-position: 5% 95% !important;
  background-size: 30% !important;
}

.logo-bottom-right {
  background-position: 95% 95% !important;
  background-size: 30% !important;
}
</style>
</head>
<body>

<h1>Xanalife Hot Deals – Advert Card Generator</h1>

<div class="controls">
  <label>Product Description</label>
  <textarea id="desc" rows="2" placeholder="e.g. Xanalife Herbal Supplement"></textarea>

  <label>Old Price</label>
  <input id="oldPrice" type="number" placeholder="e.g. 2500">

  <label>New Price</label>
  <input id="newPrice" type="number" placeholder="e.g. 1800">

  <label>Logo Position</label>
  <select id="logoPosition" style="width:100%; padding:8px; margin:6px 0 12px; border:1px solid #ccc; border-radius:4px;">
    <option value="center">Center (Default)</option>
    <option value="top-left">Top Left</option>
    <option value="top-right">Top Right</option>
    <option value="bottom-left">Bottom Left</option>
    <option value="bottom-right">Bottom Right</option>
  </select>

  <button onclick="addCard()">Add Advert</button>
  <button onclick="downloadPDF()" style="margin-left:10px;background:#444">Download A4 PDF</button>
  <button onclick="clearAll()" style="margin-left:10px;background:#c62828">Clear All</button>
</div>

<div class="page" id="printArea">
  <div class="grid" id="grid"></div>
</div>

<script>
// ===== CORE STATE =====
const MAX_ADVERTS = 6;
let advertCount = 0;

// ===== ADD ADVERT =====
function addCard(){
  const grid = document.getElementById('grid');
  const d = document.getElementById('desc').value.trim();
  const o = parseFloat(document.getElementById('oldPrice').value);
  const n = parseFloat(document.getElementById('newPrice').value);
  const position = document.getElementById('logoPosition').value;

  if(advertCount >= MAX_ADVERTS){
    alert('Only 6 adverts allowed per A4 page');
    return;
  }

  if(!d || isNaN(o) || isNaN(n) || n >= o){
    alert('Enter valid description, old price and lower new price');
    return;
  }

  const save = o - n;

  const card = document.createElement('div');
  card.className = 'card';
  
  // Add logo position class
  let positionClass = 'logo-center';
  switch(position) {
    case 'top-left': positionClass = 'logo-top-left'; break;
    case 'top-right': positionClass = 'logo-top-right'; break;
    case 'bottom-left': positionClass = 'logo-bottom-left'; break;
    case 'bottom-right': positionClass = 'logo-bottom-right'; break;
    default: positionClass = 'logo-center';
  }
  
  card.className = `card ${positionClass}`;
  
  card.innerHTML = `
    <div class="content">
      <div class="header">
        <div class="brand">XanaLife</div>
        <div class="deal">Hot Deals</div>
      </div>
      <div class="desc">${d}</div>
      <div class="prices">
        <div class="old">KES ${o.toLocaleString()}</div>
        <div class="new">KES ${n.toLocaleString()}</div>
        <div class="save">Save KES ${save.toLocaleString()}</div>
      </div>
    </div>`;

  grid.appendChild(card);
  advertCount++;
}

// ===== CLEAR ALL ADVERTS =====
function clearAll(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  advertCount = 0;
}

// ===== PDF EXPORT =====
async function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');
  const page = document.getElementById('printArea');

  const canvas = await html2canvas(page, {
    scale: 2,
    backgroundColor: '#ffffff',
    useCORS: true, // Important for loading local images
    allowTaint: true // Important for loading local images
  });

  const imgData = canvas.toDataURL('image/png');
  const pdfWidth = 210;
  const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

  pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
  pdf.save('xanalife-hot-deals.pdf');
}

// ===== PRELOAD LOGO =====
// This helps ensure the logo loads properly for html2canvas
window.addEventListener('load', function() {
  // Preload the logo image
  const logoImg = new Image();
  logoImg.src = 'logo.jpeg';
  logoImg.onload = function() {
    console.log('Logo loaded successfully');
  };
  logoImg.onerror = function() {
    console.log('Error loading logo.jpg - please ensure it exists in the same folder');
    alert('Logo image (logo.jpeg) not found. Please ensure it exists in the same folder as this HTML file.');
  };
});
</script>

</body>
</html>
